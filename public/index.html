<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JuaKazi · Gender Bias Tester</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1e7a00;--green-dark:#155700;--green-light:#e8f5e2;
  --white:#ffffff;--bg:#f7f7f8;--border:#e5e7eb;
  --text:#1a1a1a;--muted:#6b7280;
  --red:#dc3545;--amber:#d97706;--emerald:#16a34a;
  --sidebar-w:272px;
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);display:flex}

/* Sidebar */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;background:var(--green);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.15);display:flex;align-items:center;gap:12px}
.sidebar-logo img{height:40px;width:auto;flex-shrink:0}
.sidebar-logo .brand{color:#fff;font-size:.95rem;font-weight:700;line-height:1.2}
.sidebar-logo .brand span{display:block;font-size:.7rem;font-weight:400;opacity:.65;margin-top:2px}
.sidebar-section{padding:16px 12px 8px}
.sidebar-section-label{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:rgba(255,255,255,.5);padding:0 8px;margin-bottom:8px}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:0 4px}
.lang-btn{background:rgba(255,255,255,.1);border:1px solid transparent;color:rgba(255,255,255,.85);padding:8px 10px;font-size:.82rem;font-weight:500;cursor:pointer;text-align:center;transition:all .15s;border-radius:3px}
.lang-btn:hover{background:rgba(255,255,255,.2);color:#fff}
.lang-btn.active{background:#fff;color:var(--green);font-weight:700}
.sidebar-examples{flex:1;overflow-y:auto;padding:0 4px 8px}
.sidebar-examples::-webkit-scrollbar{width:3px}
.sidebar-examples::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}
.ex-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;color:rgba(255,255,255,.8);font-size:.81rem;cursor:pointer;border-radius:3px;transition:background .12s;line-height:1.4}
.ex-item:hover{background:rgba(255,255,255,.12);color:#fff}
.ex-item svg{flex-shrink:0;margin-top:2px;opacity:.55}
.sidebar-stats{border-top:1px solid rgba(255,255,255,.12);padding:14px 12px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:3px 8px;font-size:.78rem;color:rgba(255,255,255,.65)}
.stat-row b{color:#fff;font-weight:600}

/* Main */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h1{font-size:1rem;font-weight:600;color:var(--text)}
.lang-indicator{font-size:.82rem;color:var(--muted);display:flex;align-items:center;gap:7px}
.lang-indicator span{background:var(--green-light);color:var(--green);font-weight:700;font-size:.73rem;padding:2px 10px;border-radius:12px;letter-spacing:.02em}
.content{flex:1;overflow-y:auto;padding:28px 32px;display:flex;flex-direction:column;gap:16px}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:2px}

/* Input */
.input-card{background:#fff;border:1px solid var(--border);padding:22px;max-width:780px;width:100%}
textarea{width:100%;border:1.5px solid var(--border);padding:13px 15px;font-size:.9rem;font-family:inherit;resize:vertical;min-height:110px;outline:none;line-height:1.7;color:var(--text);transition:border .15s;border-radius:2px}
textarea:focus{border-color:var(--green)}
textarea::placeholder{color:#9ca3af}
.input-actions{display:flex;gap:10px;margin-top:12px;align-items:center}
.btn-run{background:var(--green);color:#fff;border:none;padding:10px 26px;font-size:.88rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .15s;border-radius:2px}
.btn-run:hover{background:var(--green-dark)}
.btn-clear{background:transparent;color:var(--muted);border:1px solid var(--border);padding:10px 16px;font-size:.88rem;cursor:pointer;transition:all .15s;border-radius:2px}
.btn-clear:hover{border-color:var(--text);color:var(--text)}
.hint{font-size:.76rem;color:var(--muted);margin-left:2px}

/* Empty */
.empty-state{max-width:780px;width:100%;padding:52px 24px;text-align:center;color:var(--muted)}
.empty-state svg{margin:0 auto 14px;opacity:.3;display:block}
.empty-state p{font-size:.9rem;line-height:1.6}

/* Result */
.result-card{background:#fff;border:1px solid var(--border);max-width:780px;width:100%}
.verdict-bar{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:13px}
.verdict-icon{width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;border-radius:2px}
.verdict-icon.bias{background:#fef2f2;color:var(--red)}
.verdict-icon.clean{background:#f0fdf4;color:var(--emerald)}
.verdict-icon.warn{background:#fffbeb;color:var(--amber)}
.verdict-icon.counter{background:var(--green-light);color:var(--green)}
.verdict-text h2{font-size:.95rem;font-weight:700;color:var(--text)}
.verdict-text p{font-size:.83rem;color:var(--muted);margin-top:3px;line-height:1.5}
.result-body{padding:18px 22px}
.section-h{font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:14px 0 8px;display:flex;align-items:center;gap:6px}
.section-h:first-child{margin-top:0}
.edit-item{border:1px solid var(--border);border-left:3px solid var(--amber);padding:11px 13px;margin:5px 0;font-size:.86rem;border-radius:0 2px 2px 0}
.edit-item.flagged{border-left-color:var(--red)}
.edit-item.advisory{border-left-color:var(--amber)}
code{font-family:'SF Mono','Fira Code',Consolas,monospace;font-size:.84em;background:#f3f4f6;padding:1px 6px;color:var(--text);border-radius:2px}
.edit-meta{color:var(--muted);font-size:.76rem;margin-top:5px}
.tag{display:inline-flex;align-items:center;padding:1px 9px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-right:6px;border-radius:2px}
.tag.red{background:#fef2f2;color:var(--red);border:1px solid #fecaca}
.tag.amber{background:#fffbeb;color:var(--amber);border:1px solid #fde68a}
.tag.green{background:#f0fdf4;color:var(--emerald);border:1px solid #bbf7d0}
.tag.purple{background:#faf5ff;color:#7c3aed;border:1px solid #ddd6fe}
.corrected-box{border:1px solid #bbf7d0;border-left:3px solid var(--emerald);background:#f0fdf4;padding:13px 16px;font-size:.9rem;line-height:1.7;color:var(--text);margin-top:6px;border-radius:0 2px 2px 0}
.detail-toggle{width:100%;padding:11px 22px;background:#fafafa;border:none;border-top:1px solid var(--border);text-align:left;font-size:.79rem;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:7px;font-family:inherit;font-weight:600;transition:background .12s}
.detail-toggle:hover{background:#f3f4f6;color:var(--text)}
.detail-body{padding:14px 22px;background:#fafafa;border-top:1px solid var(--border);font-size:.78rem;color:var(--muted);line-height:1.9}
.detail-body b{color:var(--text)}

@media(max-width:700px){
  body{flex-direction:column;overflow:auto}
  html,body{height:auto}
  .main,.content{height:auto;overflow:visible}
  .sidebar{width:100%;min-width:0;height:auto}
  .sidebar-examples{max-height:160px}
  .content{padding:16px}
  textarea{min-height:90px}
  .topbar{padding:12px 16px}
}
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">
    <img src="https://i.postimg.cc/L5mk9h1P/juakazi.png" alt="JuaKazi" onerror="this.style.display='none'">
    <div class="brand">JuaKazi<span>Gender Bias Tester</span></div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-section-label">Language</div>
    <div class="lang-grid">
      <button class="lang-btn active" onclick="setLang('en',this)">English</button>
      <button class="lang-btn" onclick="setLang('sw',this)">Swahili</button>
      <button class="lang-btn" onclick="setLang('fr',this)">French</button>
      <button class="lang-btn" onclick="setLang('ki',this)">Gikuyu</button>
    </div>
  </div>
  <div class="sidebar-section" style="flex:1;display:flex;flex-direction:column;min-height:0;padding-bottom:0">
    <div class="sidebar-section-label">Sample sentences</div>
    <div class="sidebar-examples" id="exList"></div>
  </div>
  <div class="sidebar-stats" id="sideStats"></div>
</nav>

<div class="main">
  <div class="topbar">

    <div class="lang-indicator">Testing in <span id="langLabel">English</span></div>
  </div>
  <div class="content" id="content">
    <div class="input-card">
      <textarea id="txt" placeholder="Type or paste a sentence to test for gender bias…"></textarea>
      <div class="input-actions">
        <button class="btn-run" onclick="runTest()">

          Run Test
        </button>
        <button class="btn-clear" onclick="clearAll()">Clear</button>
        <span class="hint">Ctrl + Enter to run</span>
      </div>
    </div>
    <div class="empty-state" id="emptyState">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      <p>Enter a sentence above and press <b>Run Test</b><br>to check it for gender bias.</p>
    </div>
    <div class="result-card" id="resultCard" style="display:none">
      <div class="verdict-bar">
        <div class="verdict-icon" id="vIcon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" id="vSvg"></svg>
        </div>
        <div class="verdict-text">
          <h2 id="vTitle"></h2>
          <p id="vSub"></p>
        </div>
      </div>
      <div class="result-body" id="resultBody"></div>
      <button class="detail-toggle" onclick="toggleDetail()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Full detection details
      </button>
      <div class="detail-body" id="detailBody" style="display:none"></div>
    </div>
  </div>
</div>

  const detected=[],warns=[];
  let corrected=text,count=0;
  const spans=[];
  const sorted=[...rules].sort((a,b)=>b.b.length-a.b.length);
  for(const r of sorted){
    if(!r.b)continue;
    const bl=r.b.toLowerCase();
    const idx=lower.indexOf(bl);
    if(idx===-1)continue;
    if(spans.some(([s,e])=>idx<e&&idx+r.b.length>s))continue;
    const matched=text.substring(idx,idx+r.b.length);
    let rep=r.n||r.b;
    if(matched===matched.toUpperCase()&&matched.length>1)rep=rep.toUpperCase();
    else if(matched[0]===matched[0].toUpperCase()&&matched[0]!==matched[0].toLowerCase())rep=rep[0].toUpperCase()+rep.slice(1);
    const edit={from:matched,to:rep,category:r.c||"—",severity:r.s,bias_label:r.l||"stereotype",explicitness:r.e||"explicit"};
    if(r.s==="warn"){warns.push(edit);}
    else{detected.push(edit);spans.push([idx,idx+r.b.length]);corrected=corrected.replace(new RegExp(escR(matched),""),"__S"+count+"__");count++;}
  }
  detected.forEach((e,i)=>{corrected=corrected.replace("__S"+i+"__",e.to);});
  return{detected,warns,corrected,count};
}

function setLang(lang,btn){
  currentLang=lang;
  document.querySelectorAll(".lang-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("langLabel").textContent=LANG_CONFIG[lang].label;
  renderExamples();renderStats();
  document.getElementById("resultCard").style.display="none";
  document.getElementById("emptyState").style.display="block";
}
function renderExamples(){
  document.getElementById("exList").innerHTML=EXAMPLES[currentLang].map(e=>`<div class="ex-item" onclick="useEx(this)">${ico("file",11)}<span>${e}</span></div>`).join("");
}
function renderStats(){
  const c=LANG_CONFIG[currentLang];
  document.getElementById("sideStats").innerHTML=`
    <div class="stat-row"><span>Rules</span><b>${c.rules.toLocaleString()}</b></div>
    <div class="stat-row"><span>F1 score</span><b>${c.f1}</b></div>
    <div class="stat-row"><span>AIBRIDGE tier</span><b>${c.tier}</b></div>
    <div class="stat-row"><span>Status</span><b>${c.status}</b></div>`;
}
function useEx(el){document.getElementById("txt").value=el.querySelector("span").textContent;}
function clearAll(){document.getElementById("txt").value="";document.getElementById("resultCard").style.display="none";document.getElementById("emptyState").style.display="block";}
function toggleDetail(){
  detailOpen=!detailOpen;
  document.getElementById("detailBody").style.display=detailOpen?"block":"none";
}
function runTest(){
  const text=document.getElementById("txt").value.trim();
  if(!text){document.getElementById("txt").focus();return;}
  const{detected,warns,corrected,count}=detect(text,currentLang);
  const hasBias=detected.length>0,hasWarn=warns.length>0;
  const hasDerog=detected.some(e=>e.bias_label==="derogation");
  const isCorrected=corrected!==text;
  let vClass,icoKey,title,sub;
  if(hasBias&&hasDerog){vClass="bias";icoKey="x";title="Derogatory language detected";sub="This sentence contains language that demeans or disparages a gender group.";}
  else if(hasBias){vClass="bias";icoKey="alert";title="Gender bias detected";sub="This sentence contains gendered language that may reinforce stereotypes.";}
  else if(hasWarn){vClass="warn";icoKey="info";title="Informational flag";sub="Gendered language noted for awareness — no correction applied.";}
  else{vClass="clean";icoKey="check";title="No gender bias detected";sub="This sentence does not trigger any rules in the current lexicon.";}
  document.getElementById("vIcon").className="verdict-icon "+vClass;
  document.getElementById("vSvg").innerHTML=IPATHS[icoKey];
  document.getElementById("vTitle").textContent=title;
  document.getElementById("vSub").textContent=sub;
  let body="";
  if(detected.length>0){
    body+=`<div class="section-h">${ico("zap",11)} Flagged terms</div>`;
    detected.forEach(e=>{
      const tc=e.bias_label==="derogation"?"purple":"red";
      body+=`<div class="edit-item flagged"><span class="tag ${tc}">${e.bias_label}</span><code>"${e.from}"</code> &rarr; <code>"${e.to}"</code><div class="edit-meta">Category: ${e.category} &nbsp;&bull;&nbsp; ${e.explicitness}</div></div>`;
    });
  }
  if(warns.length>0){
    body+=`<div class="section-h">${ico("info",11)} Advisory — no correction applied</div>`;
    warns.forEach(e=>{body+=`<div class="edit-item advisory"><span class="tag amber">advisory</span><code>"${e.from}"</code><div class="edit-meta">Category: ${e.category}</div></div>`;});
  }
  if(isCorrected){body+=`<div class="section-h">${ico("check",11)} Suggested correction</div><div class="corrected-box">${corrected}</div>`;}
  else if(hasBias){body+=`<div class="section-h">${ico("alert",11)} Correction</div><div class="edit-item flagged" style="color:#6b7280">Bias detected — no automatic correction available for this term. Manual review recommended.</div>`;}
  document.getElementById("resultBody").innerHTML=body;
  const cfg=LANG_CONFIG[currentLang];
  document.getElementById("detailBody").innerHTML=`<b>Language:</b> ${cfg.label} &bull; <b>Rules matched:</b> ${count} replace + ${warns.length} advisory &bull; <b>Method:</b> Rules-based hybrid &bull; <b>F1:</b> ${cfg.f1}<br>${detected.length?"<b>Flagged:</b> "+detected.map(e=>'"'+e.from+'"').join(", ")+"<br>":""}${isCorrected?"<b>Corrected:</b> "+corrected:""}`;
  detailOpen=false;
  document.getElementById("detailBody").style.display="none";
  document.getElementById("emptyState").style.display="none";
  document.getElementById("resultCard").style.display="block";
  document.getElementById("resultCard").scrollIntoView({behavior:"smooth",block:"nearest"});
}
renderExamples();renderStats();
document.getElementById("txt").addEventListener("keydown",e=>{if(e.key==="Enter"&&e.ctrlKey)runTest();});
</script>
</body>
