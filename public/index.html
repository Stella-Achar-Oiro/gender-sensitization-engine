<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JuaKazi · Gender Bias Tester</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f4f6fb;color:#1a1a2e;min-height:100vh}
  header{background:linear-gradient(90deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);color:#fff;padding:28px 40px 24px}
  header h1{font-size:1.75rem;margin-bottom:4px}
  header p{opacity:.7;font-size:.9rem}
  .container{max-width:900px;margin:32px auto;padding:0 20px}
  .card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:28px;margin-bottom:20px}
  label{font-weight:600;font-size:.85rem;text-transform:uppercase;letter-spacing:.04em;color:#555;display:block;margin-bottom:6px}
  select,textarea{width:100%;padding:10px 14px;border:1.5px solid #d9d9e3;border-radius:8px;font-size:1rem;font-family:inherit;outline:none;transition:border .15s}
  select:focus,textarea:focus{border-color:#0f3460}
  textarea{resize:vertical;min-height:110px;line-height:1.6}
  .row{display:flex;gap:12px;margin-top:16px}
  .row select{max-width:220px}
  button.primary{background:#0f3460;color:#fff;border:none;border-radius:8px;padding:11px 28px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .15s;white-space:nowrap}
  button.primary:hover{background:#16213e}
  button.secondary{background:#fff;color:#0f3460;border:1.5px solid #0f3460;border-radius:8px;padding:11px 20px;font-size:.95rem;cursor:pointer}
  button.secondary:hover{background:#f0f4ff}
  #result{display:none}
  .verdict{border-radius:10px;padding:20px 24px;margin-bottom:20px}
  .verdict.bias  {background:#fff1f0;border-left:5px solid #ff4d4f}
  .verdict.clean {background:#f6ffed;border-left:5px solid #52c41a}
  .verdict.counter{background:#e6f7ff;border-left:5px solid #1890ff}
  .verdict.warn  {background:#fff7e6;border-left:5px solid #fa8c16}
  .verdict h2{font-size:1.3rem;margin-bottom:4px}
  .verdict p{font-size:.9rem;color:#555;margin-top:4px}
  .tag{display:inline-block;border-radius:4px;padding:2px 10px;font-size:.75rem;font-weight:700;text-transform:uppercase;margin-right:6px;color:#fff}
  .tag.bias   {background:#ff4d4f}
  .tag.clean  {background:#52c41a}
  .tag.counter{background:#1890ff}
  .tag.warn   {background:#fa8c16}
  .tag.derog  {background:#722ed1}
  h3{font-size:1rem;font-weight:700;margin:20px 0 10px;color:#1a1a2e}
  .edit-item{background:#fffbe6;border:1px solid #ffe58f;border-radius:6px;padding:10px 14px;margin:6px 0;font-size:.9rem}
  .edit-item.warn{background:#f9f0ff;border-color:#d3adf7}
  .edit-item code{font-family:monospace;font-size:.95em}
  .corrected-box{background:#f0f9ff;border:1px solid #91d5ff;border-radius:8px;padding:14px 18px;font-size:1rem;line-height:1.6;margin-top:8px}
  .meta{background:#fafafa;border:1px solid #e8e8e8;border-radius:8px;padding:14px 18px;font-size:.82rem;color:#555;line-height:1.7;margin-top:8px}
  .meta b{color:#1a1a2e}
  .examples{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .ex-btn{background:#f0f4ff;border:1px solid #adc6ff;border-radius:6px;padding:6px 12px;font-size:.82rem;cursor:pointer;color:#0f3460;transition:background .12s}
  .ex-btn:hover{background:#d6e4ff}
  .stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
  .stat{background:#f4f6fb;border-radius:8px;padding:10px 16px;flex:1;min-width:120px;text-align:center}
  .stat .num{font-size:1.4rem;font-weight:700;color:#0f3460}
  .stat .lbl{font-size:.75rem;color:#888;margin-top:2px}
  footer{text-align:center;color:#aaa;font-size:.8rem;padding:28px 0 40px}
  @media(max-width:600px){header{padding:20px}.row{flex-direction:column}.row select{max-width:100%}}
</style>
</head>
<body>

<header>
  <h1>🔍 JuaKazi Gender Bias Tester</h1>
  <p>Type any sentence — the model will detect gender bias and suggest a correction. Supports English, Swahili, French &amp; Gikuyu.</p>
</header>

<div class="container">

  <!-- Input card -->
  <div class="card">
    <label for="lang">Language</label>
    <select id="lang" onchange="loadExamples()">
      <option value="en">English</option>
      <option value="sw">Swahili</option>
      <option value="fr">French</option>
      <option value="ki">Gikuyu</option>
    </select>

    <div style="margin-top:16px">
      <label>Try an example</label>
      <div class="examples" id="examples"></div>
    </div>

    <div style="margin-top:16px">
      <label for="txt">Enter text to test</label>
      <textarea id="txt" placeholder="Type a sentence here…"></textarea>
    </div>

    <div class="row" style="margin-top:16px">
      <button class="primary" onclick="runTest()">▶ Run Test</button>
      <button class="secondary" onclick="clearAll()">✕ Clear</button>
    </div>
  </div>

  <!-- Result card -->
  <div class="card" id="result">
    <div class="verdict" id="verdictBox">
      <div id="verdictIcon" style="font-size:1.5rem;margin-bottom:6px"></div>
      <h2 id="verdictTitle"></h2>
      <p id="verdictSub"></p>
    </div>
    <div id="editsSection"></div>
    <div id="corrSection"></div>
    <div id="metaSection"></div>
  </div>

  <!-- Stats card -->
  <div class="card">
    <label>Model statistics</label>
    <div class="stats-row">
      <div class="stat"><div class="num" id="statRules">—</div><div class="lbl">Rules loaded</div></div>
      <div class="stat"><div class="num" id="statF1">—</div><div class="lbl">F1 score</div></div>
      <div class="stat"><div class="num" id="statTier">—</div><div class="lbl">AIBRIDGE tier</div></div>
      <div class="stat"><div class="num" id="statStatus">—</div><div class="lbl">Status</div></div>
    </div>
  </div>

</div>

<footer>JuaKazi Gender Sensitization Engine · Rules-based detection · AI BRIDGE v1</footer>

// ── Detection engine (JS port) ─────────────────────────────────────────────────
function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function detectAndCorrect(text, lang) {
  const rules = LEXICONS[lang] || [];
  const lower = text.toLowerCase();
  const detected = [];
  const warns = [];
  let corrected = text;
  let matchCount = 0;

  // Sort by length desc so longer phrases match first
  const sorted = [...rules].sort((a,b) => b.b.length - a.b.length);

  for (const rule of sorted) {
    if (!rule.b) continue;
    const severity = rule.s || "replace";
    const biasedLower = rule.b.toLowerCase();

    // Case-insensitive match
    const idx = lower.indexOf(biasedLower);
    if (idx === -1) continue;

    const matched = text.substring(idx, idx + rule.b.length);
    const neutral = rule.n || rule.b;

    // Case-preserve
    let replacement = neutral;
    if (matched === matched.toUpperCase() && matched.length > 1) {
      replacement = neutral.toUpperCase();
    } else if (matched[0] === matched[0].toUpperCase() && matched[0] !== matched[0].toLowerCase()) {
      replacement = neutral[0].toUpperCase() + neutral.slice(1);
    }

    const edit = {
      from: matched,
      to: replacement,
      neutral: neutral,
      category: rule.c || "—",
      severity: severity,
      bias_label: rule.l || "stereotype",
      explicitness: rule.e || "explicit",
      tags: rule.t || "",
    };

    if (severity === "warn") {
      warns.push(edit);
    } else {
      detected.push(edit);
      // Apply first non-overlapping match only
      const re = new RegExp(escapeRegex(matched), "");
      corrected = corrected.replace(re, replacement);
      matchCount++;
    }
  }

  return { detected, warns, corrected, matchCount };
}

function loadExamples() {

  const cfg = LANG_CONFIG[lang];

  document.getElementById("statF1").textContent = cfg.f1;
  document.getElementById("statTier").textContent = cfg.tier;
  document.getElementById("statStatus").textContent = cfg.status;

  const ex = EXAMPLES[lang] || [];
  document.getElementById("examples").innerHTML = ex.map(e =>
    `<button class="ex-btn" onclick="useExample(this)">${e}</button>`
  ).join("");
  document.getElementById("result").style.display = "none";
}

function useExample(btn) {
  document.getElementById("txt").value = btn.textContent;
}

function clearAll() {
  document.getElementById("txt").value = "";
  document.getElementById("result").style.display = "none";
}

function runTest() {
  const text = document.getElementById("txt").value.trim();
  if (!text) { alert("Please enter some text first."); return; }
  const lang = document.getElementById("lang").value;

  const { detected, warns, corrected, matchCount } = detectAndCorrect(text, lang);

  const hasBias    = detected.length > 0;
  const hasWarn    = warns.length > 0;
  const hasDerog   = detected.some(e => e.bias_label === "derogation");
  const isCorrected = corrected !== text;

  // Determine verdict
  let verdict, icon, title, sub, vClass;
  if (hasBias && hasDerog) {
    verdict = "DEROGATION"; vClass = "bias"; icon = "🚨";
    title = "Derogatory language detected";
    sub = "This sentence contains language that demeans or disparages a gender group.";
  } else if (hasBias) {
    verdict = "BIAS"; vClass = "bias"; icon = "⚠️";
    title = "Gender bias detected";
    sub = "This sentence contains gendered language that may reinforce stereotypes.";
  } else if (hasWarn) {
    verdict = "ADVISORY"; vClass = "warn"; icon = "ℹ️";
    title = "Informational flag";
    sub = "Gendered language noted for awareness — no correction required.";
  } else {
    verdict = "CLEAN"; vClass = "clean"; icon = "✅";
    title = "No gender bias detected";
    sub = "This sentence does not trigger any bias rules.";
  }

  // Verdict box
  const vb = document.getElementById("verdictBox");
  vb.className = "verdict " + vClass;
  document.getElementById("verdictIcon").textContent = icon;
  document.getElementById("verdictTitle").textContent = title;
  document.getElementById("verdictSub").textContent = sub;

  // Edits
  let editsHtml = "";
  if (detected.length > 0) {
    editsHtml += `<h3>🏷️ Flagged terms</h3>`;
    for (const e of detected) {
      const tagCls = e.bias_label === "derogation" ? "derog" : "bias";
      editsHtml += `<div class="edit-item">
        <span class="tag ${tagCls}">${e.bias_label}</span>
        <code>"${e.from}"</code> → <code>"${e.to}"</code>
        &nbsp;<small style="color:#888">category: ${e.category} | ${e.explicitness}</small>
      </div>`;
    }
  }
  if (warns.length > 0) {
    editsHtml += `<h3>ℹ️ Advisory flags (no correction applied)</h3>`;
    for (const e of warns) {
      editsHtml += `<div class="edit-item warn">
        <span class="tag warn">warn</span>
        <code>"${e.from}"</code>
        &nbsp;<small style="color:#888">category: ${e.category}</small>
      </div>`;
    }
  }
  document.getElementById("editsSection").innerHTML = editsHtml;

  // Correction
  let corrHtml = "";
  if (isCorrected) {
    corrHtml = `<h3>✏️ Suggested correction</h3><div class="corrected-box">${corrected}</div>`;
  } else if (hasBias) {
    corrHtml = `<h3>✏️ Correction</h3><div style="color:#888;font-size:.9rem;margin-top:6px">Bias detected but no automatic correction available for this specific term. Manual review recommended.</div>`;
  }
  document.getElementById("corrSection").innerHTML = corrHtml;

  // Meta
  const metaHtml = `<h3>🔬 Detection details</h3>
  <div class="meta">
    <b>Language:</b> ${LANG_CONFIG[lang].label} &nbsp;|&nbsp;
    <b>Rules matched:</b> ${matchCount} replace + ${warns.length} warn &nbsp;|&nbsp;
    <b>Method:</b> Rules-based (hybrid engine) &nbsp;|&nbsp;
    <b>F1:</b> ${LANG_CONFIG[lang].f1}
    ${detected.length > 0 ? "<br><b>Flagged terms:</b> " + detected.map(e=>'"'+e.from+'"').join(", ") : ""}
    ${isCorrected ? "<br><b>Corrected text:</b> " + corrected : ""}
  </div>`;
  document.getElementById("metaSection").innerHTML = metaHtml;

  document.getElementById("result").style.display = "block";
  document.getElementById("result").scrollIntoView({behavior:"smooth", block:"nearest"});
}
