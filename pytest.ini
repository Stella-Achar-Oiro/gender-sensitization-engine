[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# NOTE: pythonpath NOT set here - handled by conftest.py to avoid assertion rewriting conflicts
# Disable assertion rewriting for application modules (only rewrite test files)
consider_namespace_packages = true
norecursedirs = ml scripts eval api review_ui
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
addopts =
    -v
    --strict-markers
    --tb=short
    --import-mode=importlib
