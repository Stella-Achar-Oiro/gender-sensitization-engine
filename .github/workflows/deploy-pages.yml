name: Deploy to GitHub Pages

"on":
  push:
    branches:
      - main
    paths:
      - 'public/index.html'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Copy the static app to a temp dir
          mkdir -p /tmp/gh-pages-deploy
          cp public/index.html /tmp/gh-pages-deploy/index.html
          touch /tmp/gh-pages-deploy/.nojekyll

          # Push to gh-pages branch (orphan — only index.html)
          cd /tmp/gh-pages-deploy
          git init
          git checkout -b gh-pages
          git add index.html .nojekyll
          git commit -m "Deploy live tester [skip ci]"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Stella-Achar-Oiro/gender-sensitization-engine.git
          git push origin gh-pages --force
