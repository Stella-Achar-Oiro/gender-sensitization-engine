version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./audit_logs:/app/audit_logs
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  ui:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./audit_logs:/app/audit_logs
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
    command: streamlit run review_ui/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api